name: Build, push and deploy

on:
  push:
    branches: [main]

env:
  PROJECT_ID: spam-classifier-sms
  REGION: us-east4
  REPOSITORY: spam-classifier-repo
  IMAGE: spam-classifier

jobs:
  build-push-deploy:
    name: Build, push and deploy to Cloud Run
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # required for Workload Identity Federation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Download model weights from GCS
        run: |
          mkdir -p src/model/bge_spam_classifier
          gsutil -m cp -r gs://spam-classifier-sms-model/bge_spam_classifier/* src/model/bge_spam_classifier/

      - name: Build and push
        run: |
          IMAGE_URI=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}
          docker build --platform linux/amd64 \
            -t $IMAGE_URI:latest \
            -t $IMAGE_URI:${{ github.sha }} \
            .
          docker push $IMAGE_URI:latest
          docker push $IMAGE_URI:${{ github.sha }}

      - name: Deploy to Cloud Run
        run: |
          IMAGE_URI=${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}
          gcloud run deploy ${{ env.IMAGE }} \
            --image $IMAGE_URI:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --platform managed \
            --gpu 1 \
            --gpu-type nvidia-l4 \
            --no-gpu-zonal-redundancy \
            --cpu 4 \
            --memory 16Gi \
            --port 8080 \
            --max-instances 1

      - name: Print Cloud Run URL
        run: |
          echo "Cloud Run URL:"
          gcloud run services describe ${{ env.IMAGE }} \
            --region ${{ env.REGION }} \
            --format="value(status.url)"
